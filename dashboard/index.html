<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARGOS Enterprise</title>
  <link rel="stylesheet" href="/static/css/variables.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <link rel="stylesheet" href="/static/css/layout.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="brand">ARGOS<span>XAI</span></div>
      <nav id="nav"></nav>
      <div class="sidebar-foot">
        <span id="conn-status" class="badge offline">offline</span>
      </div>
    </aside>
    <main id="main">
      <header id="topbar">
        <h1 id="view-title">Panel</h1>
        <div class="topbar-actions">
          <button id="btn-theme" class="btn ghost" title="Tema">🌓</button>
          <span id="user-badge" class="badge"></span>
        </div>
      </header>
      <section id="view" class="view"></section>
    </main>
  </div>
  <script src="/static/js/store.js" defer></script>
  <script src="/static/js/api.js" defer></script>
  <script src="/static/js/websocket.js" defer></script>
  <script src="/static/js/login.js" defer></script>
  <script src="/static/js/components.js" defer></script>
  <script src="/static/js/views.js" defer></script>
  <script src="/static/js/app.js" defer></script>
</body>
</html>
