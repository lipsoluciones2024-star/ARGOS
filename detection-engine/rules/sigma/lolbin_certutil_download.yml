title: LOLBin CertUtil Download
id: a7d5b4f0-1b2c-4d3e-8f9a-000000000010
status: stable
description: Detects certutil.exe downloading or decoding content from the network (T1218 / T1105).
tags:
  - attack.T1218
  - attack.T1105
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - 'certutil.exe'
    CommandLine|contains:
      - 'urlcache'
      - 'decode'
      - 'http'
  condition: selection
level: high
